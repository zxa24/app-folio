  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 padding-bottom: 28px;\n    border-bottom: 1px solid var(--line-2);\n  }\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 10px;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--ink-2);\n  }\n  .eyebrow .dot {\n    width: 8px; height: 8px; background: var(--accent); border-radius: 50%;\n    box-shadow: 0 0 0 4px rgba(255,91,31,.18);\n  }\n  h1 {\n    font-family: \"Instrument Serif\", serif;\n    font-weight: 400;\n    font-size: 96px;\n    line-height: 0.92;\n    letter-spacing: -0.02em;\n    margin: 14px 0 6px;\n  }\n  h1 em { font-style: italic; color: var(--accent); }\n  h1 .cn {\n    font-style: normal;\n    font-size: 48px;\n    color: var(--muted);\n    margin-left: 16px;\n    letter-spacing: 0;\n    vertical-align: 14px;\n  }\n  .tagline {\n    font-size: 19px;\n    line-height: 1.5;\n    color: var(--ink-2);\n    max-width: 820px;\n    margin-top: 12px;\n  }\n  .meta {\n    text-align: right;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 11px;\n    color: var(--muted);\n    line-height: 1.7;\n    letter-spacing: 0.04em;\n  }\n  .meta b { color: var(--ink); font-weight: 600; }\n\n  /* ---------- Section header ---------- */\n  .sec-head {\n    display: flex; align-items: baseline; gap: 16px;\n    margin: 72px 0 24px;\n  }\n  .sec-num {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 12px;\n    letter-spacing: 0.18em;\n    color: var(--accent);\n    border: 1px solid var(--accent);\n    padding: 4px 10px;\n    border-radius: 4px;\n    background: var(--ok-bg);\n  }\n  .sec-title {\n    font-family: \"Instrument Serif\", serif;\n    font-size: 44px; font-weight: 400;\n    letter-spacing: -0.01em;\n    margin: 0;\n  }\n  .sec-sub {\n    margin-left: auto;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 11px;\n    color: var(--muted);\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n  }\n\n nt-family: \"JetBrains Mono\", monospace;\n    font-size: 10.5px; letter-spacing: 0.18em;\n    text-transform: uppercase; color: var(--muted);\n    margin-bottom: 6px;\n  }\n  .mode-card h3 {\n    font-family: \"Instrument Serif\", serif;\n    font-size: 32px; font-weight: 400;\n    margin: 0 0 6px;\n    letter-spacing: -0.01em;\n  }\n  .mode-card .pair {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 12px;\n    color: var(--accent);\n    margin-bottom: 12px;\n    letter-spacing: 0.04em;\n  }\n  .mode-card.b .pair { color: var(--accent-2); }\n  .mode-card p { font-size: 14px; color: var(--ink-2); line-height: 1.55; margin: 0; }\n\n  /* ---------- Platform / shortcuts row ---------- */\n  .keystrip {\n    background: var(--ink);\n    color: #efece4;\n    border-radius: 16px;\n    padding: 32px 36px;\n    display: grid;\n    grid-template-columns: 1.1fr 1fr 1fr;\n    gap: 32px;\n  }\n  .keystrip h3 {\n    font-family: \"Instrument Serif\", serif;\n    font-size: 30px; font-weight: 400;\n    margin: 0 0 8px;\n    letter-spacing: -0.01em;\n  }\n  .keystrip .col p {\n    font-size: 13px;\n    line-height: 1.55;\n    color: #cfcabd;\n    margin: 0 0 14px;\n  }\n  .keystrip .lbl {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 10.5px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: #8a8576;\n    margin-bottom: 10px;\n  }\n  .kbd-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }\n  .kbd {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 12px;\n    padding: 5px 10px;\n    background: #2a2f37;\n    border: 1px solid #3a4049;\n    border-bottom-width: 2px;\n    border-radius: 6px;\n    color: #efece4;\n  }\n  .kbd .k { color: #ff8a5a; }\n  .platform-row { display: flex; gap: 10px; flex-wrap: wrap; }\n  .platform {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 11px;\n    padding: 6px 12px;\n    border-radius: 999px;\n    background: #2a2f37;\n    border: 1px solid #3a4049;\n    color: #efece4;\n    letter-spacing: 0.05em;\n  }\n  .platform b { color: #ff8a5a; }\n\n  /* ---------- Principles ---------- */\n  .principles {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 14px;\n  }\n  .pcard {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 20px;\n    display: flex; flex-direction: column; gap: 10px;\n    min-height: 200px;\n  }\n  .pcard .num {\n    font-family: \"Instrument Serif\", serif;\n    font-size: 36px;\n    line-height: 1;\n    color: var(--accent);\n    letter-spacing: -0.02em;\n    font-style: italic;\n  }\n  .pcard h5 {\n    font-family: \"Instrument Serif\", serif;\n    font-size: 22px;\n    line-height: 1.2;\n    margin: 0;\n    letter-spacing: -0.01em;\n    color: var(--ink);\n  }\n  .pcard p { margin: 0; font-size: 13px; line-height: 1.55; color: var(--ink-2); }\n  .pcard .rule {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 10.5px;\n    letter-spacing: 0.06em;\n    color: var(--muted);\n    border-top: 1px dashed var(--line-2);\n    padding-top: 8px;\n    margin-top: auto;\n    line-height: 1.6;\n  }\n  .pcard .rule b { color: var(--ink); }\n\n  /* ---------- Quality / future block ---------- */\n  .quality {\n    display: grid;\n    grid-template-columns: 1.2fr 1fr;\n    gap: 18px;\n  }\n  .check-grid {\n    display: grid;\n    grid-template-columns: repeat(2, 1fr);\n    gap: 10px 18px;\n    margin-top: 10px;\n  }\n  .check {\n    display: grid;\n    grid-template-columns: 18px 1fr;\n    gap: 10px;\n    font-size: 13px;\n    line-height: 1.45;\n    color: var(--ink-2);\n  }\n  .check .icn { margin-top: 3px; align-self: start; width: 14px; height: 14px; flex: none; }\n  .future-card {\n    background: linear-gradient(180deg, #f7f4ec 0%, #ece8df 100%);\n    border: 1px dashed var(--accent-2);\n    border-radius: 14px;\n    padding: 22px 24px;\n    position: relative;\n  }\n  .future-card .stamp {\n    position: absolute;\n    top: 22px; right: 22px;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 10px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--accent-2);\n    border: 1px solid var(--accent-2);\n    padding: 4px 8px;\n    border-radius: 4px;\n  }\n  .future-card h4 { margin: 0 0 10px; }\n  .future-card .ttl {\n    font-family: \"Instrument Serif\", serif;\n    font-size: 26px;\n    line-height: 1.15;\n    margin: 0 0 8px;\n    letter-spacing: -0.01em;\n  }\n\n  /* ---------- Workflow pipeline (appendix) ---------- */\n  .pipeline { margin-top: 32px; position: relative; }\n  .pipe-stages {\n    display: grid; grid-template-columns: repeat(5, 1fr);\n    gap: 20px; position: relative; z-index: 1;\n  }\n  .stage-head {\n    display: flex; flex-direction: column; align-items: flex-start;\n    padding-bottom: 12px; position: relative;\n  }\n  .pipe-num {\n    width: 96px; height: 96px;\n    background: var(--card);\n    border: 1.5px solid var(--ink);\n    border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    font-family: \"Instrument Serif\", serif;\n    font-size: 54px; line-height: 1; color: var(--ink);\n    box-shadow: 5px 5px 0 var(--ink);\n    margin-bottom: 16px;\n    position: relative; z-index: 2;\n  }\n  .pipe-num::after {\n    content: \"\"; position: absolute; inset: 6px;\n    border-radius: 50%; border: 1px dashed var(--line-2);\n  }\n  .stage-head .connector {\n    position: absolute;\n    top: 48px; left: 96px;\n    height: 2px;\n    width: calc(100% + 20px - 96px);\n    background: repeating-linear-gradient(to right, var(--ink) 0 6px, transparent 6px 12px);\n    opacity: .32; z-index: 1; pointer-events: none;\n  }\n  .pipe-stages > div:last-child .connector { display: none; }\n  .stage-head .connector::after {\n    content: \"\"; position: absolute; right: -1px; top: 50%;\n    width: 6px; height: 6px;\n    border-right: 1.5px solid var(--ink);\n    border-top: 1.5px solid var(--ink);\n    transform: translateY(-50%) rotate(45deg);\n    opacity: .55;\n  }\n  .stage-tag {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 10.5px; letter-spacing: 0.16em;\n    text-transform: uppercase; color: var(--muted);\n    margin-bottom: 6px;\n  }\n  .stage-title-x {\n    font-family: \"Instrument Serif\", serif;\n    font-size: 26px; line-height: 1.1;\n    color: var(--ink); letter-spacing: -0.01em;\n    margin-bottom: 8px;\n  }\n  .stage-actor {\n    font-size: 12.5px; color: var(--ink-2);\n    line-height: 1.45; margin-bottom: 14px;\n  }\n  .status-badge {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;\n    padding: 5px 10px; border-radius: 999px;\n    border: 1px solid currentColor;\n  }\n  .status-badge .pulse { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }\n  .status-shipped { color: var(--accent); background: var(--ok-bg); }\n  .status-partial { color: var(--warn);  background: var(--warn-bg); }\n  .stage-card {\n    margin-top: 14px;\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 12px;\n    padding: 16px 18px 18px;\n  }\n  .stage-card h6 {\n    margin: 0 0 10px;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 10px; letter-spacing: 0.18em;\n    text-transform: uppercase; color: var(--muted);\n    display: flex; align-items: center; gap: 8px;\n  }\n  .stage-card h6::before {\n    content: \"\"; width: 12px; height: 1.5px; background: var(--ink);\n  }\n  .pipe-items { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }\n  .pipe-items li {\n    display: grid; grid-template-columns: 16px 1fr; gap: 9px;\n    font-size: 12.5px; line-height: 1.45; color: var(--ink-2);\n  }\n  .pipe-items li b { color: var(--ink); font-weight: 600; }\n  .pipe-items li.dim { color: var(--muted); }\n  .pipe-items li.dim b { color: var(--ink-2); }\n  .pipe-icn {\n    margin-top: 3px; width: 13px; height: 13px;\n    border-radius: 4px;\n    display: inline-flex; align-items: center; justify-content: center;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 8.5px; font-weight: 700; color: white;\n    flex-shrink: 0;\n  }\n  .pipe-icn.ok    { background: var(--accent); }\n  .pipe-icn.warn  { background: var(--warn); }\n  .pipe-icn.plan  { background: transparent; color: var(--muted); border: 1.5px dashed var(--muted); }\n  .accent-panel {\n    margin-top: 12px; padding: 11px 13px;\n    background: linear-gradient(180deg, #fff7ef 0%, #ffece0 100%);\n    border: 1px solid #ffd6bc; border-radius: 10px;\n    font-size: 11.5px; color: #6e2a0a; line-height: 1.5;\n  }\n  .accent-panel b { color: #b13c0a; }\n  .pipe-legend {\n    display: flex; flex-wrap: wrap; gap: 24px;\n    margin: 6px 0 10px; font-size: 12.5px; color: var(--ink-2);\n  }\n  .pipe-legend .lg { display: inline-flex; align-items: center; gap: 8px; }\n  .pipe-legend .chip {\n    display: inline-flex; align-items: center; justify-content: center;\n    width: 16px; height: 16px; border-radius: 4px;\n    font-size: 10px; font-weight: 700; color: white;\n  }\n  .pipe-legend .chip.ok    { background: var(--accent); }\n  .pipe-legend .chip.warn  { background: var(--warn); }\n  .pipe-legend .chip.plan  { background: transparent; color: var(--muted); border: 1.5px dashed var(--muted); }\n\n  /* Snapshot strip */\n  .snapshot {\n    margin-top: 36px; padding: 30px 36px;\n    background: var(--ink); color: #efece4;\n    border-radius: 16px; position: relative; overflow: hidden;\n  }\n  .snapshot::before {\n    content: \"\"; position: absolute; inset: 0;\n    background:\n      radial-gradient(600px 200px at 90% 0%, rgba(255,91,31,.18), transparent 60%),\n      radial-gradient(500px 200px at 0% 100%, rgba(22,87,214,.18), transparent 60%);\n    pointer-events: none;\n  }\n  .snap-head {\n    display: flex; align-items: baseline; justify-content: space-between;\n    margin-bottom: 22px; position: relative;\n  }\n  .snap-head h3 {\n    font-family: \"Instrument Serif\", serif;\n    font-size: 36px; font-weight: 400; margin: 0; letter-spacing: -0.01em;\n  }\n  .snap-head h3 em { color: #ff8a5a; font-style: italic; }\n  .snap-head .right {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;\n    color: #b8b3a6;\n  }\n  .snap-grid {\n    display: grid; grid-template-columns: repeat(5, 1fr);\n    gap: 1px; background: rgba(255,255,255,0.08);\n    border-radius: 12px; overflow: hidden; position: relative;\n  }\n  .snap-cell {\n    background: var(--ink-2);\n    padding: 18px 20px 20px;\n    display: flex; flex-direction: column; gap: 8px;\n  }\n  .snap-cell .lbl {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 10px; letter-spacing: 0.16em;\n    text-transform: uppercase; color: #b8b3a6;\n  }\n  .snap-cell .name { font-size: 14px; color: #efece4; line-height: 1.3; font-weight: 500; }\n  .snap-cell .pct {\n    font-family: \"Instrument Serif\", serif;\n    font-size: 32px; color: #efece4; line-height: 1; margin-top: 4px;\n  }\n  .snap-cell .pct .small { font-size: 16px; color: #b8b3a6; }\n  .snap-cell .bar {\n    height: 4px; border-radius: 2px;\n    background: rgba(255,255,255,0.1); overflow: hidden; margin-top: 4px;\n  }\n  .snap-cell .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 2px; }\n  .snap-cell.partial .bar > span { background: #f0b441; }\n\n  .loop {\n    margin-top: 22px;\n    display: flex; align-items: center; gap: 16px;\n    padding: 16px 20px;\n    background: var(--card); border: 1px dashed var(--ink);\n    border-radius: 12px;\n    font-size: 13px; color: var(--ink-2); line-height: 1.5;\n  }\n  .loop b { color: var(--ink); font-weight: 600; }\n  .loop svg { flex-shrink: 0; }\n\n  /* ---------- Footer ---------- */\n  .footer {\n    margin-top: 72px;\n    padding-top: 24px;\n    border-top: 1px solid var(--line-2);\n    display: flex; justify-content: space-between; align-items: center;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 11px; color: var(--muted);\n    letter-spacing: 0.06em;\n  }\n  .footer .brandmark {\n    display: inline-flex; align-items: center; gap: 10px;\n    color: var(--ink); font-weight: 600;\n  }\n  .footer .brandmark .sq {\n    width: 12px; height: 12px; background: var(--accent); border-radius: 3px;\n    box-shadow: 3px 3px 0 var(--ink);\n  }\n<\u002Fstyle>\n\n\n<\u002Fhead>\n<body>\n<div class=\"page\">\n\n  <!-- ===== Masthead ===== -->\n  <header class=\"mast\">\n    <div>\n      <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan> UI / UX prompt spec · §0 product context<\u002Fspan>\n      <h1>Folio<span class=\"cn\">译笺<\u002Fspan><\u002Fh1>\n      <h1 style=\"font-size:42px; margin-top:-6px; color:var(--ink-2);\">A desktop tool for translating, <em>proofing &amp; reviewing.<\u002Fem><\u002Fh1>\n      <p class=\"tagline\">AI drafts most of the translation; the human's job is to verify, correct, and polish. Folio is built so every decision and every micro-edit on top of an AI draft is as fast as possible — not a tool for translating from scratch.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"meta\">\n      <div><b>Spec section<\u002Fb> &nbsp; §0 / context<\u002Fdiv>\n      <div><b>License<\u002Fb> &nbsp; Open source · MIT<\u002Fdiv>\n      <div><b>Last update<\u002Fb> &nbsp; 2026-04-30<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== Identity ===== -->\n  <div class=\"sec-head\">\n    <span class=\"sec-num\">01<\u002Fspan>\n    <h2 class=\"sec-title\">Who, what, for whom<\u002Fh2>\n    <span class=\"sec-sub\">Identity<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"identity\">\n    <div class=\"id-card hero\">\n      <span class=\"lbl\">Core positioning<\u002Fspan>\n      <span class=\"val\"><em>Verify the AI<\u002Fem>, don't retype it.<\u002Fspan>\n      <span class=\"desc\">AI drafts most of the translation. The human's job is to confirm, fix errors, and polish the last mile. The product earns its keep by making decisions and micro-edits on top of a draft as efficient as possible — not by helping a translator start from a blank page.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"id-card\">\n      <span class=\"lbl\">Users<\u002Fspan>\n      <span class=\"val\">Professional translators &amp; reviewers<\u002Fspan>\n      <span class=\"desc\">Working in publishing, design / DTP layout, and software localization. Folio itself is open source — code, schema and shortcuts are inspectable and forkable.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"id-card\">\n      <span class=\"lbl\">Working unit<\u002Fspan>\n      <span class=\"val\">Translation Package<\u002Fspan>\n      <span class=\"desc\">Source paragraphs, AI draft, PDF preview, glossary, comments, format markup, writeback metadata. Generated by an upstream design-side script (e.g. InDesign export) or created in-app. Open file format, fully readable without Folio.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Modes ===== -->\n  <div class=\"sec-head\">\n    <span class=\"sec-num\">02<\u002Fspan>\n    <h2 class=\"sec-title\">Two work modes<\u002Fh2>\n    <span class=\"sec-sub\">Same shell, different intent<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"modes\">\n    <div class=\"mode-card\">\n      <span class=\"label\">Mode A<\u002Fspan>\n      <h3>Translation<\u002Fh3>\n      <div class=\"pair\">source ⇄ target &nbsp;·&nbsp; bilingual<\u002Fdiv>\n      <p>The default mode. The AI draft is loaded into the target side; the translator verifies, fixes, and polishes paragraph by paragraph against the source.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mode-card b\">\n      <span class=\"label\">Mode B<\u002Fspan>\n      <h3>Editing<\u002Fh3>\n      <div class=\"pair\">single language &nbsp;·&nbsp; same-tongue review<\u002Fdiv>\n      <p>Monolingual revision, copy-edit and style-pass. Same paragraph workflow, no source side, no target language switch — used for proofing already-translated or original-language documents.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Platform & i18n ===== -->\n  <div class=\"sec-head\">\n    <span class=\"sec-num\">03<\u002Fspan>\n    <h2 class=\"sec-title\">Platform, languages, keys<\u002Fh2>\n    <span class=\"sec-sub\">Cross-platform · keyboard-complete<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"keystrip\">\n    <div class=\"col\">\n      <div class=\"lbl\">Theme &amp; locale<\u002Fdiv>\n      <h3>Light + dark.<br>UI in many tongues.<\u002Fh3>\n      <p>Light and dark themes, follow OS or manual. UI strings localize across 中 / EN / 日 and more — buttons, hints, empty states, error copy, shortcut labels all swap. <b style=\"color:#fff\">Default render is English<\u002Fb>; Chinese examples in this spec are reading aids only.<\u002Fp>\n      <div class=\"platform-row\">\n        <span class=\"platform\">UI: <b>EN<\u002Fb> default<\u002Fspan>\n        <span class=\"platform\">中文<\u002Fspan>\n        <span class=\"platform\">日本語<\u002Fspan>\n        <span class=\"platform\">…<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col\">\n      <div class=\"lbl\">Desktop, three OSes<\u002Fdiv>\n      <p style=\"margin-bottom:18px;\">Cross-platform desktop app. Modifier keys auto-adapt to the host OS — Windows / Linux render <span class=\"kbd\">Ctrl<\u002Fspan>, macOS renders <span class=\"kbd\">⌘<\u002Fspan>; <span class=\"kbd\">Alt ↔ ⌥<\u002Fspan>, <span class=\"kbd\">Shift ↔ ⇧<\u002Fspan>. The spec uses Windows notation; the UI re-maps at render time.<\u002Fp>\n      <div class=\"platform-row\">\n        <span class=\"platform\"><b>Windows<\u002Fb><\u002Fspan>\n        <span class=\"platform\"><b>macOS<\u002Fb><\u002Fspan>\n        <span class=\"platform\"><b>Linux<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col\">\n      <div class=\"lbl\">Keyboard-complete<\u002Fdiv>\n      <p style=\"margin-bottom:14px;\">Every action is reachable without the mouse. The Command Palette is the global entry point — covers every menu item, every navigation target.<\u002Fp>\n      <div class=\"kbd-row\">\n        <span class=\"kbd\"><span class=\"k\">Ctrl<\u002Fspan>+K<\u002Fspan>\n        <span class=\"kbd\">Command palette<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"kbd-row\">\n        <span class=\"kbd\"><span class=\"k\">?<\u002Fspan><\u002Fspan>\n        <span class=\"kbd\">Shortcut sheet (popover)<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"kbd-row\">\n        <span class=\"kbd\">Tab<\u002Fspan>\n        <span class=\"kbd\">Esc<\u002Fspan>\n        <span class=\"kbd\">↑ ↓<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a8576;\">inline hints<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Quality model ===== -->\n  <div class=\"sec-head\">\n    <span class=\"sec-num\">04<\u002Fspan>\n    <h2 class=\"sec-title\">Quality &amp; AI signal<\u002Fh2>\n    <span class=\"sec-sub\">Deterministic now, model-aware later<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"quality\">\n    <div class=\"panel\">\n      <h4>Today · Deterministic checks <span class=\"pill\">MVP<\u002Fspan><\u002Fh4>\n      <p class=\"head-sub\" style=\"margin-bottom:6px;\">The current generic translation API (Google / DeepL / …) gives no per-segment confidence. All issue surfacing is rule-based, fully local, fully explainable.<\u002Fp>\n      <ul class=\"pipe-items\" style=\"display:grid; grid-template-columns: 1fr 1fr; gap: 8px 24px;\">\n        <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Placeholder integrity<\u002Fb> — control codes, tags, variables match.<\u002Fspan><\u002Fli>\n        <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Length-ratio outlier<\u002Fb> — target unusually long/short vs source.<\u002Fspan><\u002Fli>\n        <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Glossary consistency<\u002Fb> — same term, same translation.<\u002Fspan><\u002Fli>\n        <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Untranslated residue<\u002Fb> — source-script chars left in target.<\u002Fspan><\u002Fli>\n        <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Empty target<\u002Fb> — segment has no translation.<\u002Fspan><\u002Fli>\n        <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Punctuation pairing<\u002Fb> — quotes / brackets balanced &amp; localized.<\u002Fspan><\u002Fli>\n        <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Number consistency<\u002Fb> — figures preserved across the segment.<\u002Fspan><\u002Fli>\n        <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Trailing-space &amp; whitespace<\u002Fb> hygiene.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div class=\"future-card\">\n      <span class=\"stamp\">Future · post-MVP<\u002Fspan>\n      <h4 style=\"margin: 0 0 12px; font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.18em; text-transform:uppercase; color: var(--accent-2);\">— · Reserved slot<\u002Fh4>\n      <div class=\"ttl\">LLM reflection &amp; QE-model confidence<\u002Fdiv>\n      <p style=\"font-size:13.5px; line-height:1.55; color:var(--ink-2); margin:0 0 14px;\">When we add a self-reflection pass or a quality-estimation model, each segment will gain a <b>confidence dimension<\u002Fb>. The card UI must reserve a \"quality signal\" slot now so it can light up later — but no confidence visuals ship in MVP.<\u002Fp>\n      <ul class=\"items\">\n        <li><span class=\"icn fut\">·<\u002Fspan><span><b>Per-segment confidence band<\u002Fb> — visual slot on the card, currently empty.<\u002Fspan><\u002Fli>\n        <li><span class=\"icn fut\">·<\u002Fspan><span><b>\"Why flagged\" rationale<\u002Fb> — model trace on demand, hidden until ready.<\u002Fspan><\u002Fli>\n        <li><span class=\"icn fut\">·<\u002Fspan><span><b>Severity sort<\u002Fb> — high-risk first, MVP just sorts by deterministic flag count.<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Core UI principles ===== -->\n  <div class=\"sec-head\">\n    <span class=\"sec-num\">05<\u002Fspan>\n    <h2 class=\"sec-title\">Core UI principles<\u002Fh2>\n    <span class=\"sec-sub\">How the app behaves, before we draw a pixel<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"principles\">\n    <div class=\"pcard\">\n      <span class=\"num\">i.<\u002Fspan>\n      <h5>Minimal by default, explain in place<\u002Fh5>\n      <p>The main view carries only what the primary task needs. Anything that might confuse — system actions, placeholders, check results, status icons, AI traces — wears a one-line inline explanation right beside it. No hover-only tooltips, no doc lookups; secondary surfaces (config, history, batch ops, settings) live in popovers / drawers / the command palette so the segment context never disappears.<\u002Fp>\n      <span class=\"rule\"><b>Rule<\u002Fb> &nbsp; If you wrote a tooltip, write it as visible micro-copy. If a nav drops the segment context, it's a bug.<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"pcard\">\n      <span class=\"num\">ii.<\u002Fspan>\n      <h5>AI is an assistant, not an arbiter<\u002Fh5>\n      <p>AI drafts, AI suggestions and AI auto-checks are visually <b>identifiable but not loud<\u002Fb>. Accept / modify / reject actions are quick and <b>symmetric<\u002Fb> — the UI never nudges the translator toward any one of them. Issue surfacing is deterministic and explainable today; future LLM confidence has a reserved slot, not a louder voice.<\u002Fp>\n      <span class=\"rule\"><b>Rule<\u002Fb> &nbsp; If \"Accept\" is a button, \"Reject\" is the same-weight button right beside it.<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"pcard\" style=\"background: var(--ink); color: #efece4; border-color: var(--ink); background-image: radial-gradient(420px 160px at 100% 0%, rgba(255,91,31,.18), transparent 60%);\">\n      <span class=\"num\" style=\"color:#ff8a5a;\">iii.<\u002Fspan>\n      <h5 style=\"color:#fff;\">Decision-cost &gt; clicks<\u002Fh5>\n      <p style=\"color:#cfcabd;\">Folio optimizes the cognitive cost of <b style=\"color:#fff\">deciding what's right<\u002Fb> — not the click count. Showing the AI draft + source + glossary + flags <b style=\"color:#fff\">in one frame<\u002Fb> beats saving a button. Every destructive action is one-click reversible; every action is keyboard-reachable; the app stays usable offline.<\u002Fp>\n      <span class=\"rule\" style=\"color:#8a8576; border-color:#3a4049;\"><b style=\"color:#efece4\">North star<\u002Fb> &nbsp; Time-to-confident-confirm per segment.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Appendix: upstream workflow ===== -->\n  <div class=\"sec-head\">\n    <span class=\"sec-num\">06<\u002Fspan>\n    <h2 class=\"sec-title\">Upstream workflow &amp; status<\u002Fh2>\n    <span class=\"sec-sub\">How a translation package gets to Folio · today's reality<\u002Fspan>\n  <\u002Fdiv>\n\n  <p style=\"font-size: 14px; line-height: 1.55; color: var(--ink-2); max-width: 1100px; margin: -8px 0 22px;\">\n    Folio is one stop on a five-stage pipeline that turns InDesign layout translation into a one-click assembly line: designer exports the package, translator works in the browser (today's web app, evolving into Folio), designer reimports and the translated layout opens with bolds, italics, colors and overflow auto-restored.\n  <\u002Fp>\n\n  <div class=\"pipe-legend\">\n    <span class=\"lg\"><span class=\"chip ok\">✓<\u002Fspan> <b style=\"color:var(--ink)\">Shipped<\u002Fb> — in production<\u002Fspan>\n    <span class=\"lg\"><span class=\"chip plan\">·<\u002Fspan> <b style=\"color:var(--ink)\">Planned<\u002Fb> — scoped, not built<\u002Fspan>\n  <\u002Fdiv>\n\n  <section class=\"pipeline\">\n    <div class=\"pipe-stages\">\n\n      <!-- ============ STAGE 1 ============ -->\n      <div>\n        <div class=\"stage-head\">\n          <div class=\"connector\"><\u002Fdiv>\n          <div class=\"pipe-num\">1<\u002Fdiv>\n          <div class=\"stage-tag\">DESIGNER · INDESIGN<\u002Fdiv>\n          <div class=\"stage-title-x\">Export the translation package<\u002Fdiv>\n          <div class=\"stage-actor\">A script bundles preview PDF, fill-in template and per-paragraph format metadata for the translator.<\u002Fdiv>\n          <span class=\"status-badge status-shipped\"><span class=\"pulse\"><\u002Fspan> Shipped<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Outputs &amp; capture<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Click-mapped preview PDF<\u002Fb>; translator template; emphasis cheat-sheet; IDML backup.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Per-paragraph size, leading, alignment, indents, spacing recorded.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Position of every <b>bold, italic, color, underline, super/subscript<\u002Fb> run.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Mixed CN/EN passages auto-detected; long passages flagged for AI focus.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Original design file is never modified.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============ STAGE 2 ============ -->\n      <div>\n        <div class=\"stage-head\">\n          <div class=\"connector\"><\u002Fdiv>\n          <div class=\"pipe-num\">2<\u002Fdiv>\n          <div class=\"stage-tag\">TRANSLATOR · WEB / FOLIO<\u002Fdiv>\n          <div class=\"stage-title-x\">Translate paragraph by paragraph<\u002Fdiv>\n          <div class=\"stage-actor\">Card-based UI, in-place format tools, AI assist with placeholder protection, format-painter for emphasis. (This is what Folio replaces.)<\u002Fdiv>\n          <span class=\"status-badge status-partial\"><span class=\"pulse\"><\u002Fspan> Shipped · with caveat<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Translation surface<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Cards<\u002Fb> with status badges; click-syncs to PDF and back.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Selection toolbar: <b>bold, italic, super, color, comment<\u002Fb>. Ctrl+B / Ctrl+I.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Comments travel as off-canvas sticky-notes for the designer.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Soft-break runs auto-merged; can be split manually.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>AI assist<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Free Google endpoint, batched concurrency.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Placeholders &amp; special chars protected, restored after MT.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>AI suggests which words keep bold / italic in the target.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Planned<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span><b>Glossary<\u002Fb> for term consistency.<\u002Fspan><\u002Fli>\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>Side-by-side source / target view.<\u002Fspan><\u002Fli>\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>Desktop build (becomes <b>Folio<\u002Fb>).<\u002Fspan><\u002Fli>\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>Better AI: context window, self-revision, glossary constraints.<\u002Fspan><\u002Fli>\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>App-level undo &amp; version history.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============ STAGE 3 ============ -->\n      <div>\n        <div class=\"stage-head\">\n          <div class=\"connector\"><\u002Fdiv>\n          <div class=\"pipe-num\">3<\u002Fdiv>\n          <div class=\"stage-tag\">DESIGNER · INDESIGN<\u002Fdiv>\n          <div class=\"stage-title-x\">One-click reimport<\u002Fdiv>\n          <div class=\"stage-actor\">Panel with sane defaults; locates each paragraph, reapplies formatting, fixes overflows, opens the translated file.<\u002Fdiv>\n          <span class=\"status-badge status-shipped\"><span class=\"pulse\"><\u002Fspan> Shipped<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Configuration panel<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>13 dimensions<\u002Fb> for \"what counts as a different style\".<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Style-merge strictness — 5 steps, KDE-based.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Color-match tolerance — 5 steps, exact → loose.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Frame safety net<\u002Fb> — pre-snapshot + post-import overflow fix.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Force target-language font, or follow majority.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Import behavior<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Locates every paragraph including <b>table cells<\u002Fb>; failures skip safely.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Scattered styles cluster into a clean handful.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Mixed CN/EN runs use the right script's font automatically.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Pre-flight gate catches missing glyphs/links, scrambled text.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Whole import is <b>one Ctrl+Z<\u002Fb>.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Success → translated file auto-opens. Failure → log only.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Quick mode<\u002Fb> — text + emphasis only, skip restyling.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Planned<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span><b>Cross-language font mapping<\u002Fb> — CN ↔ EN paired faces.<\u002Fspan><\u002Fli>\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>\"Likely cause\" hints on located-failures.<\u002Fspan><\u002Fli>\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>Failure list visible inside the translator app.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============ STAGE 4 ============ -->\n      <div>\n        <div class=\"stage-head\">\n          <div class=\"connector\"><\u002Fdiv>\n          <div class=\"pipe-num\">4<\u002Fdiv>\n          <div class=\"stage-tag\">DESIGNER · QA<\u002Fdiv>\n          <div class=\"stage-title-x\">Review &amp; deliver<\u002Fdiv>\n          <div class=\"stage-actor\">Translated file opens; designer fixes overflow, exports a review PDF for the copywriter. Reporting solid; structure manual.<\u002Fdiv>\n          <span class=\"status-badge status-partial\"><span class=\"pulse\"><\u002Fspan> Reports ready · process manual<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Working today<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Translated file auto-opens; font subs &amp; missing links surface immediately.<\u002Fspan><\u002Fli>\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span><b>Full writeback report<\u002Fb>: replacements, skips, unmatched, soft-break cleanup, frame fixes, panel choices used.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Gaps to close<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>Naming / folder / version conventions <em>(in progress)<\u002Fem>.<\u002Fspan><\u002Fli>\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>Standardized review-PDF export preset check.<\u002Fspan><\u002Fli>\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>Structured copywriter feedback → change-list.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============ STAGE 5 ============ -->\n      <div>\n        <div class=\"stage-head\">\n          <div class=\"connector\"><\u002Fdiv>\n          <div class=\"pipe-num\">5<\u002Fdiv>\n          <div class=\"stage-tag\">TEAM · ITERATION<\u002Fdiv>\n          <div class=\"stage-title-x\">Feedback &amp; iterate<\u002Fdiv>\n          <div class=\"stage-actor\">Copywriter sends notes; designer re-exports next round. Anchors are stable; tracking is not.<\u002Fdiv>\n          <span class=\"status-badge status-partial\"><span class=\"pulse\"><\u002Fspan> Stable rewrite · tracking missing<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Working today<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li><span class=\"pipe-icn ok\">✓<\u002Fspan><span>Second-round writeback never misaligns — stable per-paragraph anchors; emphasis re-applies if text is unchanged.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"stage-card\">\n          <h6>Gaps to close<\u002Fh6>\n          <ul class=\"pipe-items\">\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>Feedback templates &amp; change-list tracking.<\u002Fspan><\u002Fli>\n            <li class=\"dim\"><span class=\"pipe-icn plan\">·<\u002Fspan><span>Versioned history / rollback.<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"stage-card\" style=\"background: linear-gradient(180deg,#1657d6 0%, #103f9e 100%); border-color:#103f9e; color:#eaf0ff;\">\n          <h6 style=\"color:#a8c0f5;\">First production validation<\u002Fh6>\n          <div style=\"font-family:'Instrument Serif',serif; font-size:36px; line-height:1; color:#fff; letter-spacing:-0.01em;\">2026·04·29<\u002Fdiv>\n          <div style=\"font-size:12px; line-height:1.5; color:#cdd9f5; margin-top:6px;\">Frame-overflow auto-fix shipped today, integrated into Stage ③.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Snapshot strip -->\n  <section class=\"snapshot\">\n    <div class=\"snap-head\">\n      <h3>Pipeline <em>snapshot<\u002Fem><\u002Fh3>\n      <div class=\"right\">Health · 2026-04-30<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"snap-grid\">\n      <div class=\"snap-cell partial\">\n        <span class=\"lbl\">Stage ①<\u002Fspan>\n        <span class=\"name\">Export translation package<\u002Fspan>\n        <span class=\"pct\">80<span class=\"small\">%<\u002Fspan><\u002Fspan>\n        <div class=\"bar\"><span style=\"width:80%\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"snap-cell partial\">\n        <span class=\"lbl\">Stage ②<\u002Fspan>\n        <span class=\"name\">Web translation<\u002Fspan>\n        <span class=\"pct\">50<span class=\"small\">%<\u002Fspan><\u002Fspan>\n        <div class=\"bar\"><span style=\"width:50%\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"snap-cell partial\">\n        <span class=\"lbl\">Stage ③<\u002Fspan>\n        <span class=\"name\">One-click reimport<\u002Fspan>\n        <span class=\"pct\">80<span class=\"small\">%<\u002Fspan><\u002Fspan>\n        <div class=\"bar\"><span style=\"width:80%\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"snap-cell partial\">\n        <span class=\"lbl\">Stage ④<\u002Fspan>\n        <span class=\"name\">Review &amp; deliver<\u002Fspan>\n        <span class=\"pct\">40<span class=\"small\">%<\u002Fspan><\u002Fspan>\n        <div class=\"bar\"><span style=\"width:40%\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"snap-cell partial\">\n        <span class=\"lbl\">Stage ⑤<\u002Fspan>\n        <span class=\"name\">Feedback &amp; iterate<\u002Fspan>\n        <span class=\"pct\">30<span class=\"small\">%<\u002Fspan><\u002Fspan>\n        <div class=\"bar\"><span style=\"width:30%\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Closed loop banner -->\n  <div class=\"loop\">\n    <svg width=\"26\" height=\"26\" viewBox=\"0 0 28 28\" fill=\"none\">\n      <path d=\"M3 14a11 11 0 0 1 19-7.5M25 14a11 11 0 0 1-19 7.5\" stroke=\"#14171c\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath>\n      <path d=\"M22 3v4h-4M6 25v-4h4\" stroke=\"#ff5b1f\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n    <\u002Fsvg>\n    <div>\n      <b>Demo-ready closed loop today:<\u002Fb> &nbsp; Designer exports → translator works in browser (AI assist, placeholder safety, annotated review PDF) → designer reimports through the panel → translated file pops open in InDesign with bolds, italics, colors and overflow fixes already applied. <b>Folio<\u002Fb> upgrades stage ② into a desktop-grade reviewer's tool.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Footer ===== -->\n  <footer class=\"footer\">\n    <span class=\"brandmark\"><span class=\"sq\"><\u002Fspan> Folio · 译笺 &nbsp;—&nbsp; UI / UX prompt spec, §0 context<\u002Fspan>\n    <span>v2026.04 &nbsp;·&nbsp; open source (MIT) &nbsp;·&nbsp; default render: English &nbsp;·&nbsp; updated 2026-04-30<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
